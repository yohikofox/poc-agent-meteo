services:

  # ─── Broker NATS ──────────────────────────────────────────────────────────────
  nats:
    image: nats:2-alpine
    command: ["--name", "poc-meteo", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s
    networks:
      - poc-meteo

  # ─── Observabilité : Jaeger (traces) ──────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI Jaeger
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    networks:
      - poc-meteo

  # ─── Observabilité : Loki (logs) ──────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - poc-meteo

  # ─── Observabilité : Promtail (collecte logs Docker) ─────────────────────────
  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - poc-meteo

  # ─── Observabilité : Grafana (UI unifiée logs + traces) ───────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3002:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./config/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
      - jaeger
    networks:
      - poc-meteo

  # ─── API Gateway + Supervisor ─────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NATS_URL: "nats://nats:4222"
      OTEL_SERVICE_NAME: "api"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/agents"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped
    networks:
      - poc-meteo

  # ─── Front Next.js ────────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
    ports:
      - "3001:3001"
    environment:
      API_URL: "http://api:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - poc-meteo

  # ─── Agents autonomes ─────────────────────────────────────────────────────────
  agent-geocoding:
    build:
      context: ./apps/agents
      args:
        AGENT_TYPE: geocoding
    image: poc-meteo/agent:geocoding
    environment:
      NATS_URL: "nats://nats:4222"
      OTEL_SERVICE_NAME: "geocoding-agent"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - poc-meteo

  agent-weather-fetch:
    build:
      context: ./apps/agents
      args:
        AGENT_TYPE: weather-fetch
    image: poc-meteo/agent:weather-fetch
    environment:
      NATS_URL: "nats://nats:4222"
      OTEL_SERVICE_NAME: "weather-fetch-agent"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - poc-meteo

  agent-weather-risk:
    build:
      context: ./apps/agents
      args:
        AGENT_TYPE: weather-risk
    image: poc-meteo/agent:weather-risk
    environment:
      NATS_URL: "nats://nats:4222"
      OTEL_SERVICE_NAME: "weather-risk-agent"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - poc-meteo

  agent-report-writer:
    build:
      context: ./apps/agents
      args:
        AGENT_TYPE: report-writer
    image: poc-meteo/agent:report-writer
    environment:
      NATS_URL: "nats://nats:4222"
      OTEL_SERVICE_NAME: "report-writer-agent"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OLLAMA_URL: "${OLLAMA_URL:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.2:3b}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - poc-meteo

  agent-quality-check:
    build:
      context: ./apps/agents
      args:
        AGENT_TYPE: quality-check
    image: poc-meteo/agent:quality-check
    environment:
      NATS_URL: "nats://nats:4222"
      OTEL_SERVICE_NAME: "quality-check-agent"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - poc-meteo

  # ─── Agents itinéraire (Supervisor pattern) ───────────────────────────────────
  agent-itinerary-report-writer:
    build:
      context: ./apps/agents
      args:
        AGENT_TYPE: itinerary-report-writer
    image: poc-meteo/agent:itinerary-report-writer
    environment:
      NATS_URL: "nats://nats:4222"
      OTEL_SERVICE_NAME: "itinerary-report-writer-agent"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OLLAMA_URL: "${OLLAMA_URL:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.2:3b}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - poc-meteo

  agent-itinerary-quality:
    build:
      context: ./apps/agents
      args:
        AGENT_TYPE: itinerary-quality-check
    image: poc-meteo/agent:itinerary-quality-check
    environment:
      NATS_URL: "nats://nats:4222"
      OTEL_SERVICE_NAME: "itinerary-quality-agent"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - poc-meteo

volumes:
  grafana-data:

networks:
  poc-meteo:
    name: poc-meteo
