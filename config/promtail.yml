server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Service Docker Compose → label "service"
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      # Nom du container → label "container"
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      # Filtrer uniquement les containers du réseau poc-meteo
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        regex: 'poc-agent-meteo'
        action: keep
    pipeline_stages:
      # Parser les logs JSON Pino
      - json:
          expressions:
            level: level
            traceId: traceId
            msg: msg
      # Transformer le niveau numérique Pino → label texte
      - template:
          source: level
          template: |
            {{ if eq .Value "10" }}trace{{ else if eq .Value "20" }}debug{{ else if eq .Value "30" }}info{{ else if eq .Value "40" }}warn{{ else if eq .Value "50" }}error{{ else }}unknown{{ end }}
      - labels:
          level:
          traceId:
